<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0f2747" />
  <title>مخزن خلاف للورق</title>
  <meta name="description" content="نظام إدارة وأرشفة مرفقات العملاء والموردين">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23102a4c'/%3E%3Crect x='14' y='16' width='36' height='10' rx='5' fill='%23d8a436'/%3E%3Crect x='14' y='28' width='28' height='10' rx='5' fill='%23ffffff'/%3E%3Crect x='14' y='40' width='20' height='10' rx='5' fill='%23d8a436'/%3E%3C/svg%3E">
  <style>
    :root{
      --primary:#0f2747;
      --primary-2:#173d6b;
      --accent:#d8a436;
      --bg:#f3f6fa;
      --surface:#ffffff;
      --text:#172033;
      --muted:#6e7888;
      --border:#dfe5ed;
      --danger:#c93f49;
      --success:#17885b;
      --shadow:0 12px 35px rgba(15,39,71,.10);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Tahoma,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .hidden{display:none!important}

    /* LOGIN */
    #loginPage{
      min-height:100vh;
      display:grid;
      grid-template-columns:1.15fr .85fr;
      background:
        radial-gradient(circle at 10% 20%, rgba(216,164,54,.18), transparent 28%),
        linear-gradient(135deg,#071729,#0f2747 58%,#173d6b);
    }
    .login-brand{
      padding:55px;
      color:white;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      position:relative;
      overflow:hidden;
    }
    .login-brand:after{
      content:"";
      position:absolute;
      width:380px;height:380px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.09);
      left:-90px;bottom:-110px;
      box-shadow:0 0 0 40px rgba(255,255,255,.025),0 0 0 80px rgba(255,255,255,.018);
    }
    .brand-line{display:flex;align-items:center;gap:16px;position:relative;z-index:1}
    .logo{
      width:62px;height:62px;border-radius:18px;
      background:linear-gradient(145deg,#f1ca6e,#c89125);
      display:grid;place-items:center;
      box-shadow:0 10px 24px rgba(216,164,54,.26);
      flex:none;
    }
    .logo svg{width:38px;height:38px}
    .brand-title{font-size:28px;font-weight:800}
    .brand-sub{opacity:.72;margin-top:7px;font-size:14px}
    .hero-copy{max-width:580px;position:relative;z-index:1}
    .hero-copy h1{font-size:44px;line-height:1.35;margin:0 0 18px}
    .hero-copy p{font-size:17px;line-height:2;opacity:.78;margin:0}
    .features{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;position:relative;z-index:1}
    .feature{
      border:1px solid rgba(255,255,255,.11);
      background:rgba(255,255,255,.055);
      border-radius:16px;padding:16px;
      backdrop-filter:blur(7px)
    }
    .feature strong{display:block;margin-bottom:7px}
    .feature span{font-size:12px;opacity:.7}
    .login-panel{
      background:#f7f9fc;
      display:flex;align-items:center;justify-content:center;
      padding:35px;
      border-radius:32px 0 0 32px;
    }
    .login-card{width:min(440px,100%);background:white;padding:34px;border-radius:24px;box-shadow:0 25px 70px rgba(0,0,0,.18)}
    .login-card .mobile-logo{display:none}
    .login-card h2{margin:0 0 8px;font-size:26px}
    .login-card>p{margin:0 0 28px;color:var(--muted);line-height:1.8}
    .field{margin-bottom:17px}
    .field label{display:block;font-size:13px;font-weight:700;margin-bottom:8px}
    .control{
      width:100%;border:1px solid var(--border);background:#fbfcfe;
      border-radius:13px;padding:13px 14px;outline:none;transition:.2s
    }
    .control:focus{border-color:var(--primary-2);box-shadow:0 0 0 4px rgba(23,61,107,.09);background:#fff}
    .password-wrap{position:relative}
    .password-wrap button{
      position:absolute;left:8px;top:50%;transform:translateY(-50%);
      border:0;background:transparent;color:var(--muted);padding:7px
    }
    .btn{
      border:0;border-radius:13px;padding:12px 17px;font-weight:700;
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      transition:.2s
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;box-shadow:0 8px 18px rgba(15,39,71,.2)}
    .btn-secondary{background:#e9eef5;color:var(--primary)}
    .btn-danger{background:#fff0f1;color:var(--danger)}
    .btn-success{background:#e8f7f0;color:var(--success)}
    .btn-gold{background:#fff6df;color:#8d6510}
    .btn-block{width:100%;padding:14px}
    .error{background:#fff0f1;color:#a7242d;padding:11px 13px;border-radius:12px;margin-bottom:16px;font-size:13px}
    .login-foot{font-size:11px;color:#929baa;text-align:center;margin-top:22px}

    /* APP */
    #appPage{min-height:100vh}
    .topbar{
      height:76px;background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 24px;position:sticky;top:0;z-index:30;
    }
    .top-brand{display:flex;align-items:center;gap:12px}
    .top-brand .logo{width:46px;height:46px;border-radius:14px}
    .top-brand .logo svg{width:29px;height:29px}
    .top-brand strong{font-size:18px}
    .top-brand small{display:block;color:var(--muted);margin-top:4px}
    .userbox{display:flex;align-items:center;gap:11px}
    .avatar{width:40px;height:40px;border-radius:13px;background:#e8eef7;color:var(--primary);display:grid;place-items:center;font-weight:800}
    .user-meta strong{display:block;font-size:13px}
    .user-meta small{color:var(--muted)}
    .icon-btn{border:0;background:#f0f3f7;border-radius:11px;padding:10px;color:var(--primary)}
    .layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 76px)}
    aside{
      background:var(--primary);padding:20px 14px;color:white;
      position:sticky;top:76px;height:calc(100vh - 76px);overflow:auto
    }
    .nav-title{font-size:11px;opacity:.5;padding:9px 12px}
    .nav-btn{
      width:100%;border:0;color:rgba(255,255,255,.78);background:transparent;
      padding:12px 13px;border-radius:12px;text-align:right;margin:3px 0;
      display:flex;align-items:center;gap:10px
    }
    .nav-btn:hover,.nav-btn.active{background:rgba(255,255,255,.11);color:white}
    .nav-btn.active{box-shadow:inset -3px 0 0 var(--accent)}
    .nav-icon{width:24px;text-align:center}
    main{padding:25px;min-width:0}
    .page-head{display:flex;justify-content:space-between;align-items:flex-start;gap:15px;margin-bottom:20px}
    .page-head h2{margin:0;font-size:25px}
    .page-head p{margin:8px 0 0;color:var(--muted);font-size:13px}
    .card{background:white;border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 7px 22px rgba(15,39,71,.055);padding:20px;margin-bottom:20px}
    .card-title{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:17px}
    .card-title h3{margin:0;font-size:17px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .full{grid-column:1/-1}
    textarea.control{min-height:105px;resize:vertical}
    .upload{
      border:1.5px dashed #b9c5d5;border-radius:15px;padding:20px;text-align:center;
      background:#f9fbfd;transition:.2s
    }
    .upload:hover{border-color:var(--primary-2);background:#f4f8fc}
    .upload input{display:none}
    .preview{margin-top:14px;display:none}
    .preview img{max-width:210px;max-height:190px;border-radius:13px;border:1px solid var(--border)}
    .actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:18px}
    .list-row{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:12px 13px;border:1px solid var(--border);border-radius:13px;margin-bottom:9px
    }
    .list-row span{font-weight:700}
    .empty{text-align:center;color:var(--muted);padding:34px 10px}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
    .stat{background:white;border:1px solid var(--border);border-radius:17px;padding:18px}
    .stat span{color:var(--muted);font-size:12px}
    .stat strong{display:block;font-size:28px;margin-top:9px}
    .table-wrap{overflow:auto;border:1px solid var(--border);border-radius:15px}
    table{width:100%;border-collapse:collapse;min-width:900px;background:white}
    th,td{padding:13px 12px;text-align:right;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
    th{background:#f5f8fb;color:#536071;font-size:12px;position:sticky;top:0}
    tr:last-child td{border-bottom:0}
    .thumb{width:52px;height:52px;object-fit:cover;border-radius:10px;border:1px solid var(--border);background:#eef2f6}
    .badge{display:inline-block;padding:6px 9px;border-radius:999px;font-size:11px;font-weight:700;background:#edf3fa;color:var(--primary-2)}
    .mini-actions{display:flex;gap:6px}
    .mini-actions button{border:0;border-radius:9px;padding:7px 9px;font-size:12px}
    .modal{
      position:fixed;inset:0;background:rgba(6,18,33,.65);z-index:100;
      display:none;align-items:center;justify-content:center;padding:16px
    }
    .modal.show{display:flex}
    .modal-box{background:white;border-radius:20px;width:min(1050px,100%);max-height:90vh;overflow:auto;padding:22px;box-shadow:0 30px 80px rgba(0,0,0,.3)}
    .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:17px}
    .modal-head h3{margin:0}
    .close{border:0;background:#eef2f6;width:37px;height:37px;border-radius:11px;font-size:20px}
    .toast{
      position:fixed;left:22px;bottom:22px;background:#172033;color:#fff;
      padding:13px 17px;border-radius:12px;box-shadow:var(--shadow);z-index:200;
      opacity:0;transform:translateY(20px);pointer-events:none;transition:.25s
    }
    .toast.show{opacity:1;transform:translateY(0)}
    .mobile-nav{display:none}
    .filters-bar{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
    .section-note{font-size:12px;color:var(--muted);line-height:1.8;background:#f6f8fb;padding:12px;border-radius:12px}

    @media(max-width:900px){
      #loginPage{display:block;background:#f4f7fb;padding:20px}
      .login-brand{display:none}
      .login-panel{min-height:calc(100vh - 40px);padding:0;background:transparent;border-radius:0}
      .login-card{padding:25px 20px;border-radius:22px}
      .login-card .mobile-logo{display:flex;margin-bottom:24px}
      .layout{display:block}
      aside{display:none}
      .topbar{height:68px;padding:0 13px}
      .top-brand .brand-copy small{display:none}
      .top-brand strong{font-size:15px}
      .user-meta{display:none}
      main{padding:15px 12px 90px}
      .page-head{align-items:center}
      .page-head h2{font-size:21px}
      .grid,.grid-3,.grid-4,.filters-bar{grid-template-columns:1fr}
      .stats{grid-template-columns:repeat(2,1fr)}
      .mobile-nav{
        display:flex;position:fixed;bottom:0;left:0;right:0;background:white;
        border-top:1px solid var(--border);z-index:50;padding:7px 5px;
        overflow-x:auto;box-shadow:0 -10px 30px rgba(15,39,71,.08)
      }
      .mobile-nav button{
        min-width:76px;flex:1;border:0;background:transparent;color:#667386;
        padding:7px 5px;font-size:10px;border-radius:10px
      }
      .mobile-nav button span{display:block;font-size:20px;margin-bottom:3px}
      .mobile-nav button.active{background:#eef3f9;color:var(--primary);font-weight:700}
      .card{padding:15px}
      .actions .btn{flex:1}
      .modal-box{padding:16px}
    }
    @media(max-width:480px){
      .stats{grid-template-columns:1fr 1fr;gap:9px}
      .stat{padding:14px}
      .stat strong{font-size:23px}
      .page-head .btn{padding:10px 12px;font-size:12px}
    }
  
    body.dark{--bg:#0d1622;--surface:#111d2b;--text:#eef4fb;--muted:#aab5c3;--border:#253447}
    body.dark .card,body.dark .topbar,body.dark .login-card,body.dark .modal-box,body.dark .stat{background:#111d2b;color:var(--text)}
    body.dark .control,body.dark table,body.dark .list-row{background:#0f1a27;color:var(--text);border-color:var(--border)}
    body.dark th{background:#152334;color:#c7d1dd}


    /* ===== Version 2.0 UI ===== */
    :root{
      --primary:#102a4c;
      --primary-2:#1d4a7a;
      --accent:#d7a534;
      --bg:#f4f7fb;
      --surface:#ffffff;
      --text:#182235;
      --muted:#748094;
      --border:#e1e7ef;
      --radius:16px;
    }
    body{font-family:"Segoe UI",Tahoma,Arial,sans-serif}

    /* Login */
    #loginPage{
      min-height:100vh;
      display:grid;
      grid-template-columns:minmax(0,1fr) 430px;
      background:
        radial-gradient(circle at 16% 16%,rgba(215,165,52,.15),transparent 22%),
        radial-gradient(circle at 70% 85%,rgba(66,118,169,.18),transparent 28%),
        linear-gradient(145deg,#071522 0%,#102a4c 55%,#173f69 100%);
      overflow:hidden;
    }
    .login-brand{
      position:relative;
      padding:44px 58px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      color:#fff;
      overflow:hidden;
    }
    .login-brand:before{
      content:"";
      position:absolute;
      width:500px;height:500px;
      border:1px solid rgba(255,255,255,.07);
      border-radius:50%;
      left:-190px;bottom:-240px;
      box-shadow:0 0 0 60px rgba(255,255,255,.025),0 0 0 120px rgba(255,255,255,.018);
    }
    .login-brand:after{
      content:"";
      position:absolute;
      width:300px;height:300px;
      border-radius:50%;
      background:radial-gradient(circle,rgba(215,165,52,.14),transparent 68%);
      right:8%;top:8%;
      border:0;box-shadow:none;
    }
    .login-brand>.brand-line{
      position:absolute;
      right:54px;top:42px;
    }
    .logo{
      background:linear-gradient(145deg,#f0ca70,#c9942c);
      box-shadow:0 12px 28px rgba(215,165,52,.25);
    }
    .hero-copy{max-width:660px;position:relative;z-index:1}
    .hero-kicker{
      display:inline-flex;align-items:center;gap:8px;
      padding:8px 12px;border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);border-radius:999px;
      font-size:12px;margin-bottom:22px;color:rgba(255,255,255,.86)
    }
    .hero-copy h1{
      font-size:50px;line-height:1.3;margin:0 0 16px;
      letter-spacing:-1px;
    }
    .hero-copy p{font-size:16px;line-height:2;max-width:520px;opacity:.76;margin:0}
    .features{display:none}

    .login-panel{
      position:relative;background:#f8fafc;
      display:flex;align-items:center;justify-content:center;
      padding:30px;border-radius:34px 0 0 34px;
      box-shadow:-18px 0 60px rgba(0,0,0,.14)
    }
    .login-card{
      width:100%;max-width:370px;background:#fff;
      padding:32px 28px 24px;border-radius:22px;
      border:1px solid rgba(16,42,76,.07);
      box-shadow:0 18px 50px rgba(16,42,76,.09)
    }
    .login-card .login-mark{
      width:48px;height:48px;border-radius:14px;
      display:grid;place-items:center;
      background:#edf3f9;color:var(--primary);
      font-size:22px;margin-bottom:18px
    }
    .login-card h2{font-size:25px;margin:0 0 6px}
    .login-card>p{font-size:13px;margin:0 0 22px;color:var(--muted)}
    .login-card .field label{font-size:12px}
    .login-card .control{padding:13px 14px;background:#fbfcfe}
    .login-signature{
      direction:ltr;text-align:center;
      color:#919bab;font-size:10px;
      border-top:1px solid var(--border);
      margin-top:18px;padding-top:14px;letter-spacing:.2px
    }

    /* App shell */
    .topbar{
      height:68px;padding:0 18px;
      box-shadow:0 4px 18px rgba(16,42,76,.05)
    }
    .top-brand .logo{width:42px;height:42px;border-radius:13px}
    .top-brand strong{font-size:16px}
    .top-brand small{font-size:11px}
    .layout{grid-template-columns:242px 1fr;min-height:calc(100vh - 68px)}
    aside{top:68px;height:calc(100vh - 68px);padding:16px 12px;background:linear-gradient(180deg,#102a4c,#0b213b)}
    .nav-title{font-size:10px;letter-spacing:.3px;padding:12px 11px 6px}
    .nav-btn{padding:11px 12px;border-radius:11px;font-size:13px}
    .nav-btn.active{background:rgba(255,255,255,.12);box-shadow:inset -3px 0 0 var(--accent)}
    main{padding:22px}
    .page-head{margin-bottom:17px}
    .page-head h2{font-size:23px}
    .page-head p{font-size:12px}
    .card{border-radius:16px;padding:18px;box-shadow:0 8px 25px rgba(16,42,76,.045)}
    .stat{border-radius:15px;padding:16px;box-shadow:0 7px 20px rgba(16,42,76,.04)}
    .stat strong{font-size:25px}
    .section-note{
      display:flex;align-items:center;gap:9px;
      background:#fff8e6;color:#785b16;border:1px solid #f1dfae;
      padding:11px 13px;border-radius:12px
    }
    .section-note:before{
      content:"!";width:22px;height:22px;border-radius:50%;
      display:grid;place-items:center;background:var(--accent);
      color:#fff;font-weight:800;flex:none
    }
    .app-footer{
      margin:28px 0 10px;text-align:center;
      color:#98a2b2;font-size:10px;direction:ltr
    }
    .mobile-nav{border-top-color:var(--border)}

    body.dark .login-panel{background:#0f1b29}
    body.dark .login-card{background:#111d2b}
    body.dark .login-card .login-mark{background:#1a2a3d;color:#fff}
    body.dark .section-note{background:#2b2619;color:#ead69a;border-color:#564a2b}
    body.dark .mobile-nav{background:#111d2b}

    @media(max-width:900px){
      #loginPage{
        display:flex;align-items:center;justify-content:center;
        padding:18px;background:
          radial-gradient(circle at 50% 0,rgba(215,165,52,.15),transparent 25%),
          linear-gradient(160deg,#071522,#173f69)
      }
      .login-brand{display:none}
      .login-panel{
        width:100%;min-height:auto;padding:0;
        border-radius:0;background:transparent;box-shadow:none
      }
      .login-card{
        max-width:400px;padding:25px 20px 22px;
        box-shadow:0 24px 65px rgba(0,0,0,.25)
      }
      .login-card .mobile-logo{display:flex;margin-bottom:20px}
      .layout{display:block}
      main{padding:14px 12px 88px}
      .app-footer{margin-bottom:14px}
    }


/* ===== Clean centered login ===== */
#loginPage{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:
    radial-gradient(circle at 20% 15%, rgba(216,164,54,.14), transparent 24%),
    radial-gradient(circle at 80% 85%, rgba(75,132,188,.16), transparent 28%),
    linear-gradient(145deg,#081624 0%,#102a4c 60%,#173f69 100%);
  position:relative;
  overflow:hidden;
}
#loginPage:before,
#loginPage:after{
  content:"";
  position:absolute;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.06);
  pointer-events:none;
}
#loginPage:before{
  width:480px;height:480px;
  right:-220px;top:-220px;
  box-shadow:0 0 0 60px rgba(255,255,255,.02),0 0 0 120px rgba(255,255,255,.012);
}
#loginPage:after{
  width:360px;height:360px;
  left:-180px;bottom:-180px;
  box-shadow:0 0 0 45px rgba(255,255,255,.018);
}
.login-shell{
  width:min(430px,100%);
  position:relative;
  z-index:2;
}
.login-brand-compact{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  margin-bottom:20px;
  color:#fff;
}
.modern-logo{
  width:58px;height:58px;
  border-radius:18px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.13);
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:5px;
  padding:13px;
  box-shadow:0 14px 34px rgba(0,0,0,.2);
  backdrop-filter:blur(8px);
}
.modern-logo span{
  height:7px;border-radius:999px;display:block;
}
.modern-logo span:nth-child(1){width:100%;background:#d8a436}
.modern-logo span:nth-child(2){width:76%;background:#fff}
.modern-logo span:nth-child(3){width:52%;background:#d8a436}
.login-system-name{
  font-size:24px;
  font-weight:800;
  line-height:1.2;
}
.login-system-sub{
  margin-top:5px;
  font-size:12px;
  color:rgba(255,255,255,.64);
}
.login-card{
  width:100%;
  max-width:none;
  background:rgba(255,255,255,.98);
  padding:30px;
  border-radius:24px;
  border:1px solid rgba(255,255,255,.35);
  box-shadow:0 28px 75px rgba(0,0,0,.26);
  backdrop-filter:blur(14px);
}
.login-title{
  text-align:center;
  margin-bottom:24px;
}
.login-title h2{
  margin:0;
  font-size:25px;
  color:#172033;
}
.login-title p{
  margin:7px 0 0;
  font-size:12px;
  color:#7a8596;
}
.login-card .field{margin-bottom:16px}
.login-card .field label{
  font-size:12px;
  margin-bottom:7px;
}
.login-card .control{
  padding:13px 14px;
  background:#f9fbfd;
  border-radius:12px;
}
.login-card .btn-block{
  padding:13px;
  border-radius:12px;
  margin-top:4px;
}
.login-signature{
  margin-top:17px;
  padding-top:14px;
  border-top:1px solid #e6ebf1;
  text-align:center;
  color:#98a2b1;
  font-size:10px;
  direction:ltr;
}
body.dark #loginPage{background:linear-gradient(145deg,#050d16,#0d223b)}
body.dark .login-card{
  background:rgba(17,29,43,.98);
  border-color:#253447;
}
body.dark .login-title h2{color:#eef4fb}
body.dark .login-title p{color:#aab5c3}
body.dark .login-card .control{background:#0f1a27;color:#eef4fb}
body.dark .login-signature{border-color:#253447}

@media(max-width:600px){
  #loginPage{padding:18px}
  .login-shell{width:100%}
  .login-brand-compact{margin-bottom:16px}
  .modern-logo{width:52px;height:52px;border-radius:16px;padding:12px}
  .login-system-name{font-size:20px}
  .login-system-sub{font-size:11px}
  .login-card{padding:24px 19px;border-radius:21px}
  .login-title h2{font-size:23px}
}


.modern-top-logo{
  padding:9px!important;
  display:flex!important;
  flex-direction:column;
  justify-content:center;
  gap:4px;
  background:#102a4c!important;
  box-shadow:none!important;
}
.modern-top-logo span{height:5px;border-radius:999px;display:block}
.modern-top-logo span:nth-child(1){width:100%;background:#d8a436}
.modern-top-logo span:nth-child(2){width:76%;background:#fff}
.modern-top-logo span:nth-child(3){width:52%;background:#d8a436}

</style>
</head>
<body>


<section id="loginPage">
  <div class="login-shell">
    <div class="login-brand-compact">
      <div class="modern-logo" aria-label="شعار مخزن خلاف للورق">
        <span></span><span></span><span></span>
      </div>
      <div>
        <div class="login-system-name">مخزن خلاف للورق</div>
        <div class="login-system-sub">إدارة وأرشفة المرفقات</div>
      </div>
    </div>

    <form class="login-card" id="loginForm">
      <div class="login-title">
        <h2>تسجيل الدخول</h2>
        <p>أدخل بيانات حسابك للمتابعة</p>
      </div>

      <div id="loginError" class="error hidden">اسم المستخدم أو كلمة المرور غير صحيحة.</div>

      <div class="field">
        <label>اسم المستخدم</label>
        <input class="control" id="username" autocomplete="username" required placeholder="اسم المستخدم">
      </div>

      <div class="field">
        <label>كلمة المرور</label>
        <div class="password-wrap">
          <input class="control" id="password" type="password" autocomplete="current-password" required placeholder="كلمة المرور">
          <button type="button" id="togglePass" aria-label="إظهار كلمة المرور">◉</button>
        </div>
      </div>

      <button class="btn btn-primary btn-block" type="submit">دخول</button>

      <div class="login-signature">Mohamed_Reda_01124975452</div>
    </form>
  </div>
</section>

<section id="appPage" class="hidden">
  <header class="topbar">
    <div class="top-brand">
      <div class="logo modern-top-logo"><span></span><span></span><span></span></div>
      <div class="brand-copy"><strong>مخزن خلاف للورق</strong><small>إدارة وأرشفة المستندات</small></div>
    </div>
    <div class="userbox">
      <div class="avatar" id="avatar">M</div>
      <div class="user-meta"><strong id="currentUser">MO</strong><small>مستخدم النظام</small></div>
      <button class="icon-btn" id="themeBtn" title="تغيير الوضع">🌙</button>
      <button class="icon-btn" id="logoutBtn" title="تسجيل الخروج">خروج</button>
    </div>
  </header>

  <div class="layout">
    <aside>
      <div class="nav-title">القائمة الرئيسية</div>
      <button class="nav-btn active" data-page="dashboard"><span class="nav-icon">⌂</span>لوحة التحكم</button>
      <button class="nav-btn" data-page="lists"><span class="nav-icon">☷</span>القوائم الأساسية</button>
      <div class="nav-title">العملاء</div>
      <button class="nav-btn" data-page="customerEntry"><span class="nav-icon">＋</span>إضافة مرفق عميل</button>
      <button class="nav-btn" data-page="customerQuery"><span class="nav-icon">⌕</span>استعلامات العملاء</button>
      <div class="nav-title">الموردون</div>
      <button class="nav-btn" data-page="supplierEntry"><span class="nav-icon">＋</span>إضافة مرفق مورد</button>
      <button class="nav-btn" data-page="supplierQuery"><span class="nav-icon">⌕</span>استعلامات الموردين</button>
      <div class="nav-title">البيانات</div>
      <button class="nav-btn" data-page="backup"><span class="nav-icon">⇩</span>نسخة احتياطية</button>
    </aside>

    <main>
      <section id="dashboard" class="page-section"></section>
      <section id="lists" class="page-section hidden"></section>
      <section id="customerEntry" class="page-section hidden"></section>
      <section id="customerQuery" class="page-section hidden"></section>
      <section id="supplierEntry" class="page-section hidden"></section>
      <section id="supplierQuery" class="page-section hidden"></section>
      <section id="backup" class="page-section hidden"></section>
      <div class="app-footer">Mohamed_Reda_01124975452</div>
    </main>
  </div>

  <nav class="mobile-nav">
    <button class="active" data-page="dashboard"><span>⌂</span>الرئيسية</button>
    <button data-page="lists"><span>☷</span>القوائم</button>
    <button data-page="customerEntry"><span>👤</span>عميل</button>
    <button data-page="supplierEntry"><span>🚚</span>مورد</button>
    <button data-page="customerQuery"><span>⌕</span>استعلام</button>
  </nav>
</section>

<div class="modal" id="archiveModal">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="archiveTitle">السابق</h3>
      <button class="close" onclick="closeModal()">×</button>
    </div>
    <div id="archiveContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="app.js"></script>
</body>
</html>
